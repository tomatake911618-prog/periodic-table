<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>周期表</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #0f172a;
  color: white;
}

.buttons { margin: 10px; }

button {
  margin: 3px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.table {
  display: grid;
  grid-template-columns: repeat(18, 70px);
  gap: 4px;
  padding: 30px;
  overflow-x: auto;
}

.element {
  background: white;
  color: black;
  border-radius: 6px;
  font-size: 10px;
  padding: 2px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  aspect-ratio: 1 / 1;
}

.symbol { font-size: 20px; font-weight: bold; }
.name { font-size: 13px; }

.flipped {
  background: white !important;
  color: transparent;
}

.correct { background: lime; }
.wrong { background: red; }

.active.alkali { background: #e80909; }
.active.alkaline { background: #ffcc66; }
.active.transition { background: #66b3ff; }
.active.metal { background: #66ff99; }
.active.nonmetal { background: #ccff66; }
.active.semiconductor { background: #e80909; }
.active.halogen { background: #ffff66; }
.active.noble { background: #cc99ff; }

@media (max-width:600px) {
  .table { grid-template-columns: repeat(18, 50px); }
  .name { display: none; }
}
</style>
</head>

<body>

<h2>周期表</h2>

<div class="buttons">
  <button onclick="filterElements('all')">全部</button>
  <button onclick="filterElements('alkali')">アルカリ金属</button>
  <button onclick="filterElements('alkaline')">アルカリ土類金属</button>
  <button onclick="filterElements('transition')">遷移金属</button>
  <button onclick="filterElements('nonmetal')">非金属</button>
</div>

<button onclick="quiz()">クイズ開始</button>
<p id="flipResult"></p>

<div class="table" id="table"></div>

<script>
let flipMode = false;
let flipTarget = null;

const elements = [
{n:1,s:"H",name:"水素",row:1,col:1,type:["nonmetal"]},
{n:2,s:"He",name:"ヘリウム",row:1,col:18,type:["noble","nonmetal"]},
{n:3,s:"Li",name:"リチウム",row:2,col:1,type:["alkali","metal"]},
{n:4,s:"Be",name:"ベリリウム",row:2,col:2,type:["alkaline","metal"]}
];

// 描画
const table = document.getElementById("table");

elements.forEach(el => {
  const div = document.createElement("div");
  div.className = "element " + el.type.join(" ");
  div.style.gridColumn = el.col;
  div.style.gridRow = el.row;

  div.innerHTML = `
    <div>${el.n}</div>
    <div class="symbol">${el.s}</div>
    <div class="name">${el.name}</div>
  `;

  // クリック処理
  div.addEventListener("click", () => {
    if (!flipMode) return;

    div.classList.remove("flipped");

    if (el.n === flipTarget.n) {
      div.classList.add("correct");
      document.getElementById("flipResult").textContent =
        `正解！ ${el.name}`;
    } else {
      div.classList.add("wrong");
      document.getElementById("flipResult").textContent =
        `不正解… 正解は ${flipTarget.name}`;
    }

    flipMode = false;
  });

  table.appendChild(div);
});

// フィルター
function filterElements(type) {
  document.querySelectorAll(".element").forEach(el => {
    el.classList.remove("active");

    if (type === "all" || el.classList.contains(type)) {
      el.classList.add("active");
    }
  });
}

// クイズ
function quiz() {
  document.querySelectorAll(".element").forEach(card => {
    card.classList.remove("correct","wrong");
    card.classList.add("flipped");
  });

  flipTarget = elements[Math.floor(Math.random() * elements.length)];
  flipMode = true;

  document.getElementById("flipResult").textContent =
    `この元素はどれ？（${flipTarget.name}）`;
}
</script>

</body>
</html>
