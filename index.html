<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>周期表</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #0f172a;
  color: white;
}

/* ボタン */
.buttons {
  margin: 10px;
}

button {
  margin: 3px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* グリッド */
.table {
  display: grid;
  grid-template-columns: repeat(18, minmax(65px, 1fr));
  gap: 4px;
  padding: 10px;
  overflow-x: auto;
}

/* 元素 */
.element {
  background: white;
  color: black;
  border-radius: 6px;
  font-size: 10px;
  padding: 2px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transition: 0.3s;
  aspect-ratio: 1 / 1;
}

.symbol {
  font-size: 20px;
  font-weight: bold;
}

.name {
  font-size: 13px;
}

/* 色付け */
.active.alkali { background: #e80909; color: black; }
.active.alkaline { background: #ffcc66; color: black; }
.active.transition { background: #66b3ff; color: black; }
.active.metal { background: #66ff99; color: black; }
.active.nonmetal { background: #ccff66; color: black; }
.active.semiconductor { background: #e80909; color:black; }
.active.halogen { background: #ffff66; color: black; }
.active.noble { background: #cc99ff; color: black; }
.active.radioactive {background: #000; color: black; }
.active.acti {background: #666666; color: black; }

/* スマホ */
@media (max-width:600px) {
  .table {
    grid-template-columns: repeat(18, 50px);
  }
  .name {
    display: none;
  }
}
</style>
</head>

  <button onclick="filterElements('noble')">希ガス</button>

  const div = document.createElement("div");
  div.className = "element " + el.type.join(" ");
  div.style.gridColumn = el.col;
  div.style.gridRow = el.row;

  div.innerHTML = `
    <div>${el.n}</div>
    <div class="symbol">${el.s}</div>
    <div class="name">${el.name}</div>
  `;

  table.appendChild(div);
});

// フィルター
function filterElements(type) {
  const all = document.querySelectorAll(".element");

  all.forEach(el => {
    el.classList.remove("active");

    if (type === "all") {
      el.classList.add("active");
    } else if (el.classList.contains(type)) {
      el.classList.add("active");
    }
  });
}
