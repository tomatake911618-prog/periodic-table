<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>周期表</title>

<style>

body {
  font-family: sans-serif;
  text-align: center;
  background: #0f172a;
  color: white;
}

/* ボタン */
.buttons {
  margin: 10px;
}

button {
  margin: 3px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* グリッド */
.table {
  display: grid;
  grid-template-columns: repeat(18, 70px);
  gap: 2px;
  padding: 20px;
  overflow-x: auto;
}

/* 元素 */
.element {
  background: white;
  color: black;
  border-radius: 6px;
  font-size: 10px;
  padding: 2px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transition: 0.3s;
  aspect-ratio: 1 / 1;
  width: 60px;
  height: 60px;
}

.symbol {
  font-size: 20px;
  font-weight: bold;
}

.name {
  font-size: 13px;
}

.hide {
  background: white !important;
  color: transparent;
}

.highlight {
  background: white !important;
  color: transparent !important;
  border:4px solid yellow;
  box-shadow: 0 0 10px yellow;
}
  
  
/* 色付け */
.active.alkali { background: #e80909; color: black; }
.active.alkaline { background: #ffcc66; color: black; }
.active.transition { background: #66b3ff; color: black; }
.active.metal { background: #66ff99; color: black; }
.active.nonmetal { background: #ccff66; color: black; }
.active.semiconductor { background: #ffcc99; color:black; }
.active.halogen { background: #ffff66; color: black; }
.active.noble { background: #cc99ff; color: black; }
.active.radioactive {background: #ff6666; color: black; }
.active.acti {background: #666666; color: black; }

/* スマホ */
@media (max-width:600px) {
  .table {
    grid-template-columns: repeat(20, 60px);
  }
  .name {
    display: none;
  }
}
</style>
</head>

// 描画
const table = document.getElementById("table");

elements.forEach(el => {
  const div = document.createElement("div");
  div.className = "element " + el.type.join(" ");
  div.style.gridColumn = el.col;
  div.style.gridRow = el.row;

  div.innerHTML = `
    <div>${el.n}</div>
    <div class="symbol">${el.s}</div>
    <div class="name">${el.name}</div>
  `;

  div.addEventListener("click",()=> {
    console.log(el.name);
      });

  table.appendChild(div);

  div.dataset.num = String(el.n);
});

// フィルター
function filterElements(type) {
  const all = document.querySelectorAll(".element");

  all.forEach(el => {
    el.classList.remove("active");

    if (type === "all") {
      el.classList.add("active");
    } else if (el.classList.contains(type)) {
      el.classList.add("active");
    }
  });
}

let typingTarget=null;
//クイズ                
function quiz() {

  document.querySelectorAll(".element").forEach(card=>{
    card.classList.remove("active");
    card.classList.add("hide");
    card.classList.remove("highlight");
  });
  let pool = elements.filter(el => typeof el.n === "number");

  if (difficulty === "easy") {
    pool = pool.filter(el => el.n <= 20);
  }
  else if (difficulty === "normal") {
    pool = pool.filter(el => el.n <= 56);
  }
  else if (difficulty === "hard") {
    pool = pool.filter(el => el.n <= 118);
  }

  if (pool.length === 0) {
    alert("この難易度に元素がありません");
    return;
  }

  typingTarget = pool[Math.floor(Math.random() * pool.length)];

  document.querySelectorAll(".element").forEach(card=>{
    if (Number(card.dataset.num) === typingTarget.n) {
      card.classList.remove("hide");
      card.classList.add("highlight");
    }
  });

  document.getElementById("Question").textContent = "この元素は？";
  document.getElementById("Answer").value = "";
  document.getElementById("result").textContent = "";
}

function setDifficulty(level) {
  difficulty=level;
document.getElementById("difficulty").style.display="none";
  quiz()
}

function check() {
  if (!typingTarget) return;
    
  const user = toHiragana(
    document.getElementById("Answer").value.trim()
  );

  const correctHira = typingTarget.hira;
  const correctName = typingTarget.name;

  if (user === correctHira || user === toHiragana(correctName)) {
    document.getElementById("result").textContent = "正解";
    document.getElementById("correctSound").play();

    setTimeout(()=> {
      quiz();
    },1000);
  } else {
    document.getElementById("result").textContent =`不正解… 正しくは ${correctName}`;
  }
}

function toHiragana(str) {
  return str.replace(/[ァ-ン]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 0x60)
  );
}

window.onload=()=> {
  document.getElementById("Answer").addEventListener("keydown", e => {
    if(e.key="enter")
      check();
    }
  });
};

function end() {
  // 全元素を表示
  document.querySelectorAll(".element").forEach(card=>{
    card.classList.remove("hide");
    card.classList.remove("highlight");
  });

  typingTarget = null;

  document.getElementById("Question").textContent = "クイズを終了しました";
  document.getElementById("result").textContent = "";
  document.getElementById("Answer").value = "";
}

function showDifficulty() {
  document.getElementById("difficulty").style.display = "block";
}

</script>
